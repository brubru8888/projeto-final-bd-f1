services:
  db:
    image: postgres:16
    container_name: f1_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: f1_user
      POSTGRES_PASSWORD: f1_pass
      POSTGRES_DB: formula1
    ports:
      - "5555:5432"   # porta externa 5555 -> porta interna 5432
    volumes:
      - f1_db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:z
      - ./dados:/dados:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U f1_user -d formula1 && psql -U f1_user -d formula1 -c \"SELECT 1 FROM pg_tables WHERE tablename = 'users'\" | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 60

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: f1_user
      DB_PASSWORD: f1_pass
      DB_NAME: formula1
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app:z
      - /app/__pycache__
    command: python server.py
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s = socket.socket(); s.connect((\"localhost\", 3000))'"]
      interval: 5s
      timeout: 2s
      retries: 20

volumes:
  f1_db_data:


